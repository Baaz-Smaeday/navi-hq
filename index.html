<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navi HQ</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Syne',sans-serif;background:#0a0a0a;color:#f0f0f0;min-height:100vh;padding-bottom:40px}
#lock{position:fixed;inset:0;background:#0a0a0a;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:99;padding:32px 24px}
.l-logo{font-size:30px;font-weight:800;letter-spacing:-1px;margin-bottom:6px}
.l-logo span{color:#00e676}
.l-sub{font-family:'DM Mono',monospace;font-size:11px;color:#555;margin-bottom:44px;letter-spacing:.05em}
.l-box{width:100%;max-width:300px;background:#111;border:1px solid #222;border-radius:16px;padding:24px 20px}
.l-label{font-family:'DM Mono',monospace;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px}
#pin{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;padding:14px 16px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:22px;letter-spacing:.3em;outline:none;margin-bottom:12px;transition:border-color .2s;text-align:center}
#pin:focus{border-color:#00e676}
#unlock{width:100%;background:#00e676;border:none;border-radius:10px;padding:14px;color:#000;font-family:'Syne',sans-serif;font-size:14px;font-weight:800;cursor:pointer}
#unlock:active{opacity:.8}
#err{font-family:'DM Mono',monospace;font-size:11px;color:#ff4d4d;text-align:center;margin-top:10px;min-height:16px}
#app{display:none}
header{padding:26px 20px 18px;border-bottom:1px solid #1a1a1a;display:flex;align-items:center;justify-content:space-between}
.logo{font-size:20px;font-weight:800;letter-spacing:-.5px}
.logo span{color:#00e676}
.htime{font-family:'DM Mono',monospace;font-size:10px;color:#444;text-align:right;line-height:1.7;cursor:pointer}
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1px;background:#1a1a1a;border-bottom:1px solid #1a1a1a}
.stat{background:#0e0e0e;padding:14px 0;text-align:center}
.stat-n{font-size:28px;font-weight:800;line-height:1}
.stat-l{font-family:'DM Mono',monospace;font-size:9px;color:#444;text-transform:uppercase;letter-spacing:.06em;margin-top:3px}
.sh{padding:18px 20px 8px;font-family:'DM Mono',monospace;font-size:10px;color:#444;text-transform:uppercase;letter-spacing:.1em;display:flex;align-items:center;gap:8px}
.sh::after{content:'';flex:1;height:1px;background:#1a1a1a}
.list{padding:0 12px;display:flex;flex-direction:column;gap:7px}
.card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:13px;text-decoration:none;color:#f0f0f0;position:relative;overflow:hidden;transition:border-color .2s}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:3px 0 0 3px;background:#2a2a2a;transition:background .3s}
.card.online::before{background:#00e676}
.card.offline::before{background:#ff4d4d}
.card.checking::before{background:#ffb300}
.card.proto::before{background:#4d9fff}
.card:active{background:#161616}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:#2a2a2a;transition:background .3s}
.card.online .dot{background:#00e676;box-shadow:0 0 5px #00e676}
.card.offline .dot{background:#ff4d4d;box-shadow:0 0 5px #ff4d4d}
.card.checking .dot{background:#ffb300;animation:blink 1s infinite}
.card.proto .dot{background:#4d9fff}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
.cinfo{flex:1;min-width:0}
.cname{font-size:15px;font-weight:600;letter-spacing:-.2px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.curl{font-family:'DM Mono',monospace;font-size:10px;color:#444}
.ctags{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap}
.tag{font-family:'DM Mono',monospace;font-size:9px;color:#333;background:#161616;border:1px solid #222;padding:1px 6px;border-radius:4px}
.tag.hot{color:#ffb300;border-color:#3a2e00;background:rgba(255,179,0,.04)}
.cmeta{text-align:right;flex-shrink:0}
.cstatus{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:3px 8px;border-radius:20px;display:inline-block;margin-bottom:3px}
.online .cstatus{background:rgba(0,230,118,.08);color:#00e676}
.offline .cstatus{background:rgba(255,77,77,.08);color:#ff4d4d}
.checking .cstatus{background:rgba(255,179,0,.08);color:#ffb300}
.proto .cstatus{background:rgba(77,159,255,.08);color:#4d9fff}
.ctime{font-family:'DM Mono',monospace;font-size:9px;color:#333}
.btn-r{display:block;margin:16px 12px 0;width:calc(100% - 24px);background:transparent;border:1px solid #222;border-radius:10px;padding:13px;color:#f0f0f0;font-family:'Syne',sans-serif;font-size:13px;font-weight:600;cursor:pointer}
.btn-r:active{border-color:#00e676;color:#00e676}
.links{padding:0 12px;display:flex;flex-direction:column;gap:6px}
.lnk{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:#f0f0f0;font-size:13px;font-weight:600}
.lnk:active{border-color:#00e676}
.lnk-sub{font-family:'DM Mono',monospace;font-size:9px;color:#444;font-weight:400;margin-top:1px}
.lnk-arr{font-family:'DM Mono',monospace;font-size:13px;color:#333}
.btn-lk{display:block;margin:14px 12px 0;width:calc(100% - 24px);background:transparent;border:1px solid #1e1e1e;border-radius:10px;padding:11px;color:#333;font-family:'DM Mono',monospace;font-size:11px;cursor:pointer;letter-spacing:.05em}
.btn-lk:active{border-color:#ff4d4d;color:#ff4d4d}
.cmd-box{margin:0 12px;background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:16px;display:flex;flex-direction:column;gap:10px}
.cmd-input{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 14px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:13px;outline:none;resize:none;min-height:44px}
.cmd-input:focus{border-color:#00e676}
.cmd-input::placeholder{color:#333}
.cmd-row{display:flex;gap:6px}
.cmd-send{flex:1;background:#00e676;border:none;border-radius:8px;padding:11px;color:#000;font-family:'Syne',sans-serif;font-size:13px;font-weight:800;cursor:pointer}
.cmd-send:active{opacity:.8}
.cmd-send:disabled{opacity:.4;cursor:not-allowed}
.cmd-sel{flex:1;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:11px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:11px;outline:none}
.qk-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.qk-btn{background:#161616;border:1px solid #222;border-radius:8px;padding:10px 8px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;text-align:left;line-height:1.3}
.qk-btn:active{border-color:#00e676;color:#00e676}
.qk-ico{font-size:14px;margin-bottom:3px}
.cmd-log{background:#0a0a0a;border:1px solid #1a1a1a;border-radius:8px;padding:10px 12px;font-family:'DM Mono',monospace;font-size:10px;color:#444;max-height:150px;overflow-y:auto;display:none}
.cmd-log.active{display:block}
.cmd-log .entry{padding:4px 0;border-bottom:1px solid #111}
.cmd-log .entry:last-child{border:none}
.cmd-log .sent{color:#00e676}
.cmd-log .fail{color:#ff4d4d}
.cmd-log .pending{color:#ffb300}
.cmd-setup{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:12px 16px;margin:0 12px}
.cmd-setup label{font-family:'DM Mono',monospace;font-size:10px;color:#555;text-transform:uppercase;letter-spacing:.1em;display:block;margin-bottom:6px}
.cmd-setup input{width:100%;background:#0a0a0a;border:1px solid #2a2a2a;border-radius:8px;padding:10px 12px;color:#f0f0f0;font-family:'DM Mono',monospace;font-size:11px;outline:none}
.cmd-setup input:focus{border-color:#00e676}
.cmd-setup .hint{font-family:'DM Mono',monospace;font-size:9px;color:#333;margin-top:6px}
.ticker{font-family:'DM Mono',monospace;font-size:10px;color:#333;padding:10px 20px;border-top:1px solid #1a1a1a;margin-top:28px;text-align:center}
</style>
</head>
<body>
<div id="lock">
  <div class="l-logo">NAVI <span>HQ</span></div>
  <div class="l-sub">project command centre</div>
  <div class="l-box">
    <div class="l-label">PIN</div>
    <input id="pin" type="password" maxlength="6" placeholder="••••" inputmode="numeric" autocomplete="off"/>
    <button id="unlock" onclick="tryUnlock()">Unlock</button>
    <div id="err"></div>
  </div>
</div>
<div id="app">
  <header>
    <div class="logo">NAVI <span>HQ</span></div>
    <div class="htime" onclick="checkAll()"><div id="clock">--:--:--</div><div>tap to refresh</div></div>
  </header>
  <div class="stats">
    <div class="stat"><div class="stat-n" id="n-live" style="color:#00e676">—</div><div class="stat-l">Live</div></div>
    <div class="stat"><div class="stat-n" id="n-proto" style="color:#4d9fff">—</div><div class="stat-l">Building</div></div>
    <div class="stat"><div class="stat-n" id="n-issue" style="color:#ff4d4d">—</div><div class="stat-l">Issues</div></div>
  </div>
  <div class="sh">Projects</div>
  <div class="list" id="list"></div>
  <button class="btn-r" onclick="checkAll()">↻ Check all projects</button>
  <div class="sh" style="margin-top:16px">Tools</div>
  <div class="links">
    <a class="lnk" href="https://vercel.com/dashboard" target="_blank"><div><div>Vercel</div><div class="lnk-sub">deployments · logs</div></div><span class="lnk-arr">↗</span></a>
    <a class="lnk" href="https://supabase.com/dashboard" target="_blank"><div><div>Supabase</div><div class="lnk-sub">databases · auth</div></div><span class="lnk-arr">↗</span></a>
    <a class="lnk" href="https://github.com/baaz-smaeday" target="_blank"><div><div>GitHub</div><div class="lnk-sub">repos · commits</div></div><span class="lnk-arr">↗</span></a>
    <a class="lnk" href="https://app.canva.com" target="_blank"><div><div>Canva</div><div class="lnk-sub">design assets</div></div><span class="lnk-arr">↗</span></a>
    <a class="lnk" href="https://dashboard.stripe.com" target="_blank"><div><div>Stripe</div><div class="lnk-sub">payments · revenue</div></div><span class="lnk-arr">↗</span></a>
  </div>
  <div class="sh" style="margin-top:16px">Command Centre</div>
  <div class="cmd-box">
    <div class="qk-grid">
      <button class="qk-btn" onclick="sendCmd('Check all project health and report status')"><div class="qk-ico">&#9889;</div>Health Check</button>
      <button class="qk-btn" onclick="sendCmd('Run git status on all projects and report changes')"><div class="qk-ico">&#128269;</div>Git Status</button>
      <button class="qk-btn" onclick="sendCmd('List any build errors or failing tests across projects')"><div class="qk-ico">&#128295;</div>Check Errors</button>
      <button class="qk-btn" onclick="sendCmd('Show deployment status for all Vercel and GitHub Pages projects')"><div class="qk-ico">&#128640;</div>Deploy Status</button>
    </div>
    <textarea class="cmd-input" id="cmd-text" placeholder="Type a command for Claude..." rows="2"></textarea>
    <div class="cmd-row">
      <select class="cmd-sel" id="cmd-project">
        <option value="general">All Projects</option>
        <option value="complyfleet">ComplyFleet</option>
        <option value="desimind">DesiMind</option>
        <option value="sivohome">SIVO Home</option>
        <option value="xeagle-booking">XEagle Booking</option>
        <option value="uk-theory-test">UK Theory Test</option>
        <option value="LoadLink">LoadLink</option>
        <option value="eagle-academy-platform">Eagle Academy</option>
        <option value="sivo-app">SIVO App</option>
        <option value="dispatch-course">Dispatch Course</option>
        <option value="letifi">Letifi</option>
        <option value="garagealert">GarageAlert</option>
        <option value="accuportal-backend">AccuPortal</option>
        <option value="uk-cartheory-classroom">Car Theory Classroom</option>
      </select>
      <button class="cmd-send" id="cmd-go" onclick="sendCustomCmd()">Send to Laptop</button>
    </div>
    <div class="cmd-log" id="cmd-log"></div>
  </div>
  <button class="btn-lk" onclick="doLock()">⎋ Lock</button>
  <div class="ticker" id="ticker">Initialising...</div>
</div>
<script>
const PIN='2578',SK='nhq_ok';
const P=[
  /* ── Live ── */
  {name:'ComplyFleet',       url:'https://complyfleet.co.uk',                     repo:'complyfleet',                  label:'complyfleet.co.uk',   tags:['Next.js','Supabase'],hot:'Add Stripe',   type:'live'},
  {name:'DesiMind',          url:'https://desimind.co.uk',                        repo:'desimind',                     label:'desimind.co.uk',      tags:['Next.js','Supabase'],hot:'Shopify token',type:'live'},
  {name:'SIVO Home',         url:'https://sivohome.com',                          repo:'sivohome',                     label:'sivohome.com',        tags:['Next.js'],           hot:null,           type:'live'},
  {name:'UK Theory Test',    url:'https://baaz-smaeday.github.io/uk-theory-test', repo:'eagle-uk-theory-test-platform',label:'GitHub Pages',        tags:['HTML/JS'],           hot:null,           type:'live'},
  {name:'Navi HQ',           url:'https://baaz-smaeday.github.io/navi-hq/',      repo:'navi-hq',                      label:'GitHub Pages',        tags:['Dashboard'],         hot:null,           type:'live'},
  /* ── Building ── */
  {name:'XEagle Booking',    url:null, repo:'xeagle-booking',             label:'Courier platform',     tags:['Next.js','Supabase'],hot:null,           type:'proto'},
  {name:'LoadLink',          url:null, repo:'LoadLink',                   label:'In development',       tags:['React Native'],      hot:null,           type:'proto'},
  {name:'Eagle Academy',     url:null, repo:'eagle-academy-platform',     label:'In development',       tags:['React/JS'],          hot:'Deploy needed',type:'proto'},
  {name:'SIVO App',          url:null, repo:'sivo-app',                   label:'In development',       tags:['App'],               hot:null,           type:'proto'},
  {name:'Dispatch Course',   url:null, repo:'dispatch-course',            label:'In development',       tags:['Course'],            hot:null,           type:'proto'},
  {name:'Car Theory Class',  url:null, repo:'uk-cartheory-classroom',     label:'Training platform',    tags:['HTML/JS'],           hot:null,           type:'proto'},
  {name:'Letifi',            url:null, repo:'letifi',                     label:'In development',       tags:['App'],               hot:null,           type:'proto'},
  {name:'GarageAlert',       url:null, repo:'garagealert',                label:'In development',       tags:['App'],               hot:null,           type:'proto'},
  {name:'AccuPortal',        url:null, repo:'accuportal-backend',         label:'Backend API',          tags:['Backend'],           hot:null,           type:'proto'},
];
function tryUnlock(){
  if(document.getElementById('pin').value===PIN){
    sessionStorage.setItem(SK,'1');
    document.getElementById('lock').style.display='none';
    document.getElementById('app').style.display='block';
    init();
  }else{
    const e=document.getElementById('err');
    e.textContent='Wrong PIN';
    document.getElementById('pin').value='';
    setTimeout(()=>e.textContent='',2000);
  }
}
function doLock(){
  sessionStorage.removeItem(SK);
  document.getElementById('lock').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('pin').value='';
}
document.getElementById('pin').addEventListener('keydown',e=>{if(e.key==='Enter')tryUnlock()});
function render(){
  const list=document.getElementById('list');
  list.innerHTML='';
  P.forEach((p,i)=>{
    const el=document.createElement('a');
    el.href=p.url||('https://github.com/Baaz-Smaeday/'+p.repo);el.target='_blank';
    el.className='card '+(p.type==='proto'?'proto':'checking');
    el.id='c'+i;
    el.innerHTML=`<div class="dot"></div><div class="cinfo"><div class="cname">${p.name}</div><div class="curl">${p.label}</div><div class="ctags">${p.tags.map(t=>`<span class="tag">${t}</span>`).join('')}${p.hot?`<span class="tag hot">${p.hot}</span>`:''}</div></div><div class="cmeta"><div class="cstatus" id="s${i}">${p.type==='proto'?'building':'checking'}</div><div class="ctime" id="t${i}">${p.type==='proto'?'local only':'...'}</div></div>`;
    list.appendChild(el);
  });
}
async function ping(i){
  const p=P[i];if(!p.url)return;
  const card=document.getElementById('c'+i);
  const s=document.getElementById('s'+i);
  const t=document.getElementById('t'+i);
  card.className='card checking';s.textContent='checking';
  const t0=Date.now();
  try{
    await fetch(p.url,{method:'HEAD',mode:'no-cors',cache:'no-store'});
    card.className='card online';s.textContent='online';t.textContent=(Date.now()-t0)+'ms';
  }catch{
    card.className='card offline';s.textContent='offline';t.textContent='no response';
  }
}
async function checkAll(){
  document.getElementById('ticker').textContent='Checking...';
  const live=P.map((p,i)=>({p,i})).filter(x=>x.p.url);
  await Promise.all(live.map(x=>ping(x.i)));
  const on=document.querySelectorAll('.card.online').length;
  const pr=document.querySelectorAll('.card.proto').length;
  const off=document.querySelectorAll('.card.offline').length;
  document.getElementById('n-live').textContent=on;
  document.getElementById('n-proto').textContent=pr;
  document.getElementById('n-issue').textContent=off;
  const now=new Date();
  document.getElementById('clock').textContent=now.toLocaleTimeString('en-GB');
  document.getElementById('ticker').textContent=`${on}/${live.length} responding · ${now.toLocaleDateString('en-GB')}`;
}
/* === Command Centre — Supabase Relay to laptop Claude Code === */
const SB_URL='https://nibemnomfzflvpnlfgbh.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5pYmVtbm9tZnpmbHZwbmxmZ2JoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQyOTMzNzYsImV4cCI6MjA4OTg2OTM3Nn0.0gQPv67Bh5Fh1PocqENfPCm-dWQDe41886VfLUgQhuM';
const SB_HDR={'Content-Type':'application/json','apikey':SB_KEY,'Authorization':'Bearer '+SB_KEY};

function cmdLog(msg,cls){
  const log=document.getElementById('cmd-log');
  log.classList.add('active');
  const d=document.createElement('div');d.className='entry '+(cls||'');
  const now=new Date().toLocaleTimeString('en-GB');
  d.innerHTML=`<span style="color:#333">${now}</span> ${msg}`;
  log.prepend(d);
}
async function sendCmd(cmd){
  cmdLog(`Sending: "${cmd.slice(0,40)}..."`,`pending`);
  try{
    const r=await fetch(SB_URL+'/rest/v1/commands',{method:'POST',headers:{...SB_HDR,'Prefer':'return=representation'},body:JSON.stringify({command:cmd,project:'general'})});
    if(r.ok){cmdLog('Sent to laptop — waiting for Claude...','sent');pollResults();}
    else{cmdLog('Failed to send','fail');}
  }catch(e){cmdLog('Network error','fail');}
}
async function sendCustomCmd(){
  const txt=document.getElementById('cmd-text').value.trim();
  if(!txt)return;
  const proj=document.getElementById('cmd-project').value;
  const cmd=proj!=='general'?`[Project: ${proj}] ${txt}`:txt;
  cmdLog(`Sending: "${cmd.slice(0,50)}${cmd.length>50?'...':''}"`,`pending`);
  try{
    const r=await fetch(SB_URL+'/rest/v1/commands',{method:'POST',headers:{...SB_HDR,'Prefer':'return=representation'},body:JSON.stringify({command:cmd,project:proj})});
    if(r.ok){cmdLog('Sent to laptop — waiting for Claude...','sent');pollResults();}
    else{cmdLog('Failed to send','fail');}
  }catch(e){cmdLog('Network error','fail');}
  document.getElementById('cmd-text').value='';
}
async function pollResults(){
  const poll=setInterval(async()=>{
    try{
      const r=await fetch(SB_URL+'/rest/v1/commands?status=eq.done&order=completed_at.desc&limit=1',{headers:SB_HDR});
      if(!r.ok)return;
      const d=await r.json();
      if(d.length>0){
        const latest=d[0];
        const ago=Math.round((Date.now()-new Date(latest.completed_at))/1000);
        if(ago<120){
          cmdLog(`Result: ${(latest.result||'Done').slice(0,200)}`,'sent');
          clearInterval(poll);
        }
      }
    }catch(e){}
  },5000);
  setTimeout(()=>clearInterval(poll),300000);
}
async function loadHistory(){
  try{
    const r=await fetch(SB_URL+'/rest/v1/commands?order=created_at.desc&limit=5',{headers:SB_HDR});
    if(!r.ok)return;
    const d=await r.json();
    d.reverse().forEach(c=>{
      const s=c.status==='done'?'sent':c.status==='error'?'fail':'pending';
      cmdLog(`${c.command.slice(0,50)} → ${c.status}`,s);
    });
  }catch(e){}
}
document.getElementById('cmd-text').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendCustomCmd();}});
function init(){render();checkAll();loadHistory();setInterval(checkAll,60000);setInterval(()=>{document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-GB');},1000);}
if(sessionStorage.getItem(SK)==='1'){document.getElementById('lock').style.display='none';document.getElementById('app').style.display='block';init();}
</script>
</body>
</html>
